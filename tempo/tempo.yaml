# Grafana Tempo — トレース保存 (単一バイナリ構成 / ローカル用)。
# otel-collector の traces パイプラインから OTLP(gRPC) で受け取り、ローカル FS に保存する。
# 用途: 「A方式」= Claude Code の OTEL_LOG_TOOL_CONTENT でツール入出力を span イベントとして残す。
stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    # 生ログ(Loki 7d)と揃えてトレースも 7 日で削除
    block_retention: 168h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

usage_report:
  reporting_enabled: false
