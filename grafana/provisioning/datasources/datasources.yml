apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: 15s

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100

  # トレース (任意)。Tempo は docker-compose の profiles:["traces"] でのみ起動する。
  # Tempo 未起動時はこのデータソースはヘルスチェックに失敗するが、トレース未使用なら無視してよい。
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
